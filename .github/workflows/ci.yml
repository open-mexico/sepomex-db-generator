name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff lint
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run tests with coverage
        run: pytest

      - name: Validate notebooks (optional)
        shell: bash
        run: |
          if find . -type f -name "*.ipynb" | grep -q .; then
            find . -type f -name "*.ipynb" -print0 | \
              xargs -0 -I{} jupyter nbconvert --execute --to notebook --inplace "{}"
          else
            echo "No notebooks found. Skipping notebook execution."
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error
